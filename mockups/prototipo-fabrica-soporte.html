<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quac — Fábrica de soporte · Bandeja de casos</title>
<!--
  Primer bosquejo — Fábrica de soporte (PDF·B7 / Playbook §7).
  Bandeja de gestión manual para casos excepcionales del journey de crédito:
  el equipo de crédito recibe, clasifica, gestiona y resuelve; al resolver,
  la solicitud RETORNA AL PUNTO EXACTO del flujo principal.
  A diferencia del vendedor de tienda, el operador SÍ ve las calificaciones
  del sistema (checklist por soporte, match facial, reglas disparadas).
  Sistema de diseño: nueva versión QuacOne (mismo del expediente v4.1).
  Prototipo de validación — NO es código de producción.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --violet:#7C3AED; --violet-dark:#6D28D9; --violet-soft:#EFEBFD; --navy:#1E1B39;
  --txt:#26263E; --txt-2:#565673; --txt-3:#9C9CB0; --mut:#A0A0B8;
  --bg:#F6F6FA; --card:#FFFFFF; --line:#ECECF2; --line-2:#F0F0F6; --thead:#F4F4FB;
  --green:#16A34A; --green-bg:#DCFCE7; --green-tx:#15803D;
  --red:#DC2626; --red-bg:#FCE7EF; --red-tx:#BE185D;
  --amber:#D97706; --amber-bg:#FEF3C7; --amber-tx:#A16207;
  --lav-bg:#EDEBFB; --lav-tx:#6D5BD0; --gray-bg:#EEEEF6; --gray-tx:#565673;
  --blue-bg:#E0F2FE; --blue-tx:#0369A1;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13.5px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.isvg{flex-shrink:0;vertical-align:-2px;display:inline-block}

#esc-bar{background:#171528;color:#B9B3D6;padding:7px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#esc-bar .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#7E76A8}
#esc-bar .sep{flex:1}
.esc-tool{border:1px solid #3A3560;background:#242043;color:#DDD8F2;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:6px}

#shell{flex:1;display:flex;overflow:hidden}
#sidebar{width:210px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 14px}
.sb-logo b{font-size:17px;font-weight:800;color:var(--navy)}
.sb-sec{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);padding:14px 16px 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 8px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--txt-2);cursor:pointer;white-space:nowrap}
.sb-item:hover{background:#F6F5FB}
.sb-item.on{background:var(--violet-soft);color:var(--violet-dark);font-weight:600}
.sb-item .ic{width:16px;display:flex;align-items:center;justify-content:center;opacity:.75}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:10px}
.sb-foot{border-top:1px solid var(--line);padding:12px 16px;font-size:12px;color:var(--txt-2)}
.sb-foot .u{font-weight:600;color:var(--txt)}
.sb-foot .out{color:var(--txt-3);margin-top:6px;cursor:pointer;display:flex;align-items:center;gap:7px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

#tabs{background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:flex-end;padding:6px 16px 0;gap:4px;flex-shrink:0}
.ntab{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--txt-3);cursor:pointer;white-space:nowrap;border:1px solid transparent;border-bottom:none;border-radius:9px 9px 0 0;position:relative}
.ntab.active{background:var(--bg);border-color:var(--line);color:var(--navy)}
.ntab.active::after{content:'';position:absolute;top:0;left:10px;right:10px;height:2.5px;border-radius:0 0 3px 3px;background:var(--violet)}
.ntab .dot{width:7px;height:7px;border-radius:50%}
.ntab .idm{font-family:var(--mono);font-size:11px;color:var(--violet);font-weight:600}
.ntab .cls{border:none;background:none;color:var(--txt-3);font-size:11px;padding:0 2px}
#titlebar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#titlebar h1{font-size:15.5px;font-weight:700;color:var(--navy)}
#titlebar .crumb{font-size:13px;color:var(--txt-3);cursor:pointer}
#titlebar .crumb:hover{color:var(--violet)}
#titlebar .sepc{color:var(--line)}
#content{flex:1;overflow-y:auto;padding:20px 24px}

.btn{border:none;border-radius:8px;padding:9px 16px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--violet);color:#fff}.btn-primary:hover{background:var(--violet-dark)}
.btn-outline{background:var(--card);border:1px solid var(--violet);color:var(--violet)}
.btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--txt-2)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green-tx)}
.b-red{background:var(--red-bg);color:var(--red-tx)}
.b-amber{background:var(--amber-bg);color:var(--amber-tx)}
.b-lav{background:var(--lav-bg);color:var(--lav-tx)}
.b-gray{background:var(--gray-bg);color:var(--gray-tx)}
.b-blue{background:var(--blue-bg);color:var(--blue-tx)}
.mono{font-family:var(--mono);font-size:12px}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:12.5px;color:var(--txt-3);width:320px}
.search input{border:none;outline:none;flex:1;background:transparent;color:var(--txt)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px}
.stat .l{font-size:11.5px;color:var(--txt-3)}
.stat .n{font-size:22px;font-weight:700;margin-top:2px;color:var(--navy)}
.stat .n.v{color:var(--violet)}.stat .n.g{color:var(--green)}.stat .n.a{color:var(--amber)}.stat .n.b{color:var(--blue-tx)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar .grow{flex:1}
.fchip{padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-size:11.5px;font-weight:600;color:var(--txt-2)}
.fchip.on{background:var(--violet-soft);border-color:#DDD0FA;color:var(--violet-dark)}
table.tb{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tb thead th{background:var(--thead);text-align:left;font-size:11.5px;font-weight:600;color:var(--txt-2);padding:11px 14px;white-space:nowrap}
.tb td{padding:12px 14px;border-top:1px solid var(--line-2);vertical-align:middle}
.tb tr.row{cursor:pointer}
.tb tr.row:hover td{background:#FAFAFE}
.tb .id{font-family:var(--mono);font-size:12px;color:var(--violet);font-weight:600}
.tb .cl b{font-size:12.5px;font-weight:600;display:block}
.tb .cl span{font-size:11px;color:var(--txt-3);font-family:var(--mono)}
.tb .mo b{font-size:12.5px;font-weight:600;display:block}
.tb .mo span{font-size:11px;color:var(--txt-3)}
.sla{font-family:var(--mono);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.sla .d{width:7px;height:7px;border-radius:50%}
.sla-g{color:var(--green-tx)}.sla-g .d{background:var(--green)}
.sla-a{color:var(--amber-tx)}.sla-a .d{background:var(--amber)}
.sla-r{color:var(--red-tx)}.sla-r .d{background:var(--red)}

/* caso */
.caso-head{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:12px}
.caso-head .who h2{font-size:16px;font-weight:700;color:var(--navy)}
.caso-head .who .m{font-size:11.5px;color:var(--txt-3);font-family:var(--mono);margin-top:2px}
.kv{min-width:96px}
.kv .k{font-size:10.5px;color:var(--txt-3)}
.kv .v{font-size:13px;font-weight:600;margin-top:2px}
.caso-head .grow{flex:1}
.ctx{border:1px solid #FDE68A;background:#FFFBEB;color:#78350F;border-radius:12px;padding:13px 18px;display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;font-size:13px}
.ctx b{display:block;font-weight:700}
.ctx .sub-t{font-size:12px;margin-top:2px}
.grid{display:flex;gap:18px;align-items:flex-start}
.g-main{flex:1;min-width:0}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:14px;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.panel h2{font-size:14.5px;font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:9px}
.panel .sub{font-size:12.5px;color:var(--txt-2);margin-bottom:14px}
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
.result{border-radius:10px;padding:13px 16px;margin:10px 0;font-size:12.5px;line-height:1.5}
.result h3{font-size:13px;font-weight:700;margin-bottom:3px}
.r-ok{background:#F0FDF4;border:1px solid #BBF7D0;color:#14532D}
.r-err{background:#FEF2F2;border:1px solid #FECACA;color:#7F1D1D}
.r-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#78350F}
.r-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E3A8A}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--txt-2);margin-bottom:5px}
.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid #DDDCE8;border-radius:8px;font-size:13px;background:var(--card);color:var(--txt)}
.field textarea{min-height:64px;resize:vertical}

/* revisión de soportes */
.sop-rev{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;gap:16px}
.sop-rev .ph{width:150px;flex-shrink:0}
.sop-rev .foto{background:linear-gradient(135deg,#E9E4F8,#DDEBF9);border:1px solid var(--line);border-radius:10px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt-3);gap:6px;font-size:10.5px;font-weight:600}
.sop-rev .ph h5{font-size:12px;font-weight:700;margin-top:8px;text-align:center}
.sop-rev .bx{flex:1;min-width:0}
.ck-line{display:flex;align-items:center;gap:8px;font-size:12px;padding:3.5px 0;color:var(--txt-2)}
.ck-line .ok{color:var(--green-tx);font-weight:700}
.ck-line .no{color:var(--red-tx);font-weight:700}
.acciones{display:flex;gap:6px;margin-top:10px}
.acc{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 12px;font-size:11.5px;font-weight:600;color:var(--txt-2);cursor:pointer}
.acc.sel-ok{border-color:#BBF7D0;background:var(--green-bg);color:var(--green-tx)}
.acc.sel-rep{border-color:#BFDBFE;background:var(--blue-bg);color:var(--blue-tx)}
.acc.sel-fr{border-color:#FECACA;background:var(--red-bg);color:var(--red-tx)}
.match{font-family:var(--mono);font-size:12px;font-weight:700}

/* rail */
.rail{width:290px;flex-shrink:0}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.rcard h4{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--violet);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.rkv{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line-2)}
.rkv:last-child{border-bottom:none}
.rkv .k{color:var(--txt-3)}
.rkv .v{font-weight:600;text-align:right}
.hist{display:flex;gap:8px}
.hist .h-foto{flex:1;background:linear-gradient(135deg,#EDE9F9,#E2EEF9);border:1px solid var(--line);border-radius:8px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt-3);font-size:9.5px;font-weight:600;gap:4px}
.tlmini .s{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--txt-3);padding:3.5px 0}
.tlmini .p{width:8px;height:8px;border-radius:50%;background:var(--line);flex-shrink:0}
.tlmini .done{color:var(--txt-2)}.tlmini .done .p{background:var(--green)}
.tlmini .attn{color:var(--amber-tx);font-weight:600}.tlmini .attn .p{background:var(--amber)}

/* drawer sucesos */
#suc-drawer{position:fixed;top:0;right:0;bottom:0;width:430px;max-width:92vw;background:var(--card);border-left:1px solid var(--line);z-index:52;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;box-shadow:-12px 0 32px rgba(30,27,57,.08)}
#suc-drawer.open{transform:none}
.sd-head{display:flex;align-items:flex-start;gap:13px;padding:20px 20px 16px;border-bottom:1px solid var(--line)}
.sd-ic{width:40px;height:40px;border-radius:11px;border:1.5px solid var(--violet-soft);color:var(--violet);display:flex;align-items:center;justify-content:center}
.sd-head h2{font-size:17px;font-weight:800;color:var(--navy)}
.sd-head .s{font-size:12px;color:var(--txt-3);margin-top:3px}
.sd-close{margin-left:auto;width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);color:var(--txt-2);font-size:12px}
.sd-body{flex:1;overflow-y:auto;padding:22px 20px}
.suc-wrap{position:relative;padding-left:44px}
.suc-wrap::before{content:'';position:absolute;left:13px;top:14px;bottom:14px;width:2px;background:var(--line)}
.suc-item{position:relative;margin-bottom:12px}
.suc-badge{position:absolute;left:-44px;top:14px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:0 0 0 4px var(--card)}
.tb-ok{background:var(--green)}.tb-sys{background:#94A3B8}.tb-info{background:var(--violet)}.tb-warn{background:var(--amber)}.tb-err{background:var(--red)}
.suc-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;display:flex;gap:12px}
.suc-card .tx{flex:1}
.suc-card .ti{font-size:13px;font-weight:700}
.suc-card .de{font-size:12px;color:var(--txt-3);margin-top:3px}
.suc-card .tm{font-size:11.5px;color:var(--txt-3);white-space:nowrap}

#guia{position:fixed;top:0;right:0;bottom:0;width:340px;background:#171528;color:#C9C3E4;z-index:50;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;border-left:3px dashed var(--violet)}
#guia.open{transform:none}
#guia .g-head{padding:14px 18px;border-bottom:1px solid #2C2850}
#guia .g-tag{font-size:9px;font-weight:700;letter-spacing:.6px;background:var(--violet);color:#fff;border-radius:20px;padding:2px 9px}
#guia h3{color:#fff;font-size:14px;margin-top:7px}
#guia .g-body{flex:1;overflow-y:auto;padding:16px 18px;font-size:12.5px;line-height:1.65}
#guia .g-body p{margin-bottom:11px}
#guia .g-body b{color:#fff}
.g-cite{display:inline-block;font-size:9.5px;font-weight:700;background:#2C2850;color:#B9A8F5;border-radius:20px;padding:1px 8px;margin:1px 2px}
#guia-toggle{position:fixed;bottom:18px;right:18px;z-index:55;width:44px;height:44px;border-radius:50%;border:none;background:var(--violet);color:#fff;font-size:18px;font-weight:700;box-shadow:0 4px 14px rgba(124,58,237,.35)}
#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#171528;color:#fff;border-radius:10px;padding:11px 18px;font-size:12.5px;font-weight:600;display:flex;gap:9px;align-items:center;animation:fadeIn .25s}
@media(max-width:1150px){.rail{display:none}}
</style>
</head>
<body>

<div id="esc-bar">
  <span class="lbl">Bosquejo v1 — Fábrica de soporte</span>
  <span class="sep"></span>
  <button class="esc-tool" onclick="location.reload()">↺ Reiniciar</button>
  <button class="esc-tool" onclick="toggleGuia()"><span data-ic="book"></span>Guía</button>
</div>

<div id="shell">
  <aside id="sidebar">
    <div class="sb-logo"><b>Quac</b></div>
    <div class="sb-scroll">
      <div class="sb-item" onclick="toast('Solo maqueta — Inicio')"><span class="ic" data-ic="home"></span>Inicio</div>
      <div class="sb-sec">Operativo</div>
      <div class="sb-item" onclick="toast('Solo maqueta — Mesa de estudios')"><span class="ic" data-ic="list"></span>Mesa de estudios</div>
      <div class="sb-item on" onclick="showBandeja()"><span class="ic" data-ic="factory"></span>Fábrica de soporte</div>
      <div class="sb-sec">Administración</div>
      <div class="sb-item" onclick="toast('Solo maqueta')"><span class="ic" data-ic="user"></span>Operadores</div>
      <div class="sb-item" onclick="toast('Solo maqueta')"><span class="ic" data-ic="alert"></span>Motivos de escalamiento</div>
      <div class="sb-item" onclick="toast('Solo maqueta')"><span class="ic" data-ic="shield"></span>Reglas de fraude</div>
      <div class="sb-sec">Diagnóstico</div>
      <div class="sb-item" onclick="toast('Solo maqueta')"><span class="ic" data-ic="bot"></span>Bot Ubica</div>
    </div>
    <div class="sb-foot"><div class="u">Operadora 03 · Ana Cifuentes</div><div class="out"><span data-ic="logout"></span>Salir</div></div>
  </aside>
  <div id="main">
    <div id="tabs"></div>
    <div id="titlebar"></div>
    <div id="content"></div>
  </div>
</div>

<aside id="suc-drawer">
  <div class="sd-head">
    <div class="sd-ic" data-ic="history"></div>
    <div><h2>Sucesos del caso</h2><div class="s">Caso F-208 · solicitud #1049</div></div>
    <button class="sd-close" onclick="toggleSucesos()">✕</button>
  </div>
  <div class="sd-body" id="sd-body"></div>
</aside>

<button id="guia-toggle" onclick="toggleGuia()">?</button>
<aside id="guia">
  <div class="g-head"><span class="g-tag">GUÍA — NO HACE PARTE DE LA INTERFAZ</span><h3 id="g-title"></h3></div>
  <div class="g-body" id="g-body"></div>
</aside>
<div id="toasts"></div>

<script>
/* ═══ íconos (Lucide, monocromo) ═══ */
const ICMAP={
 home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/>',
 list:'<path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/>',
 user:'<circle cx="12" cy="8" r="3.5"/><path d="M5 20c1-3.5 3.8-5.5 7-5.5s6 2 7 5.5"/>',
 alert:'<path d="M12 3 2.5 20h19L12 3z"/><path d="M12 10v4M12 17.2h.01"/>',
 shield:'<path d="M12 3c3 1.5 6 2 8 2v7c0 5-3.5 8-8 9-4.5-1-8-4-8-9V5c2 0 5-.5 8-2z"/>',
 bot:'<rect x="4" y="8" width="16" height="11" rx="2.5"/><path d="M12 8V4.5"/><path d="M9 13h.01M15 13h.01"/><path d="M1.8 12.5v3M22.2 12.5v3"/>',
 logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/>',
