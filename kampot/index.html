<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>KAMPOT S.A.S. — Operadores de retail de moda en Colombia</title>
  <meta name="description" content="KAMPOT S.A.S. — Operación y administración de tiendas de ropa bajo modelos de franquicia en Colombia."/>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    @media (max-width: 880px) {
      .hero-grid, .two-col, .section-head,
      .services-grid, .pillars-grid, .values-grid, .editorial-grid { grid-template-columns: 1fr !important; }
      .brands-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .radio-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .hero-image { min-height: 320px !important; aspect-ratio: 4/3 !important; }
      .brands-grid > div:nth-child(n) { border-right: 1px solid var(--rule) !important; }
      .brands-grid > div:nth-child(3n) { border-right: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="js/shared.js"></script>
  <script src="js/home.js"></script>
  <script src="js/nosotros.js"></script>
  <script src="js/servicios.js"></script>
  <script src="js/contacto.js"></script>
  <script src="js/pqrs.js"></script>
  <script src="js/placeholder.js"></script>

  <script>
    var ROUTES = ['inicio','nosotros','servicios','contacto','pqrs','politica','terminos'];

    function getInitialRoute() {
      var h = window.location.hash.replace('#','').split('?')[0];
      return ROUTES.indexOf(h) !== -1 ? h : 'inicio';
    }

    function App() {
      var routeState = useState(getInitialRoute());
      var route = routeState[0];
      var setRoute = routeState[1];

      var navigate = function(r) {
        setRoute(r);
        window.location.hash = r;
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      useEffect(function() {
        var onHash = function() {
          var r = getInitialRoute();
          setRoute(r);
          window.scrollTo({ top: 0, behavior: 'instant' });
        };
        window.addEventListener('hashchange', onHash);
        return function() { window.removeEventListener('hashchange', onHash); };
      }, []);

      var tweaks = {
        heroHeadline: 'Operamos y hacemos crecer tiendas de ropa en Colombia.'
      };

      var label =
        route === 'politica' ? 'Política de Tratamiento de Datos' :
        route === 'terminos' ? 'Términos y Condiciones' : null;

      return React.createElement('div', { 'data-screen-label': route, key: route },
        React.createElement(Header, { route: route, navigate: navigate }),
        React.createElement('main', null,
          route === 'inicio' && React.createElement(HomePage, { navigate: navigate, tweaks: tweaks }),
          route === 'nosotros' && React.createElement(NosotrosPage, { navigate: navigate }),
          route === 'servicios' && React.createElement(ServiciosPage, { navigate: navigate }),
          route === 'contacto' && React.createElement(ContactoPage, { navigate: navigate }),
          route === 'pqrs' && React.createElement(PqrsPage, { navigate: navigate }),
          (route === 'politica' || route === 'terminos') &&
            React.createElement(Placeholder, { title: label, navigate: navigate })
        ),
        React.createElement(Footer, { navigate: navigate })
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
